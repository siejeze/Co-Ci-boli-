<style>

:root{
  --paper:#F1F3EA;
  --card:#FAFBF4;
  --ink:#26332B;
  --ink-soft:#4B5A50;
  --moss:#47684F;
  --moss-deep:#2E4A38;
  --line:#D6DCC6;
  --raspberry:#9E3D4E;
  --raspberry-bg:#F7EBEC;
  --honey:#8F6A1E;
  --honey-bg:#F5EDD8;
}
*{box-sizing:border-box}
.app{
  min-height:100vh;
  background:var(--paper);
  color:var(--ink);
  font-family:'Karla',system-ui,sans-serif;
  font-size:16px;
  line-height:1.55;
  -webkit-font-smoothing:antialiased;
}
.topbar{
  max-width:660px;margin:0 auto;padding:18px 20px 0;
  display:flex;justify-content:space-between;align-items:center;gap:12px;
}
.brand{
  font-family:'Cormorant Garamond',serif;font-style:italic;font-weight:600;
  font-size:20px;color:var(--moss-deep);
  background:none;border:none;cursor:pointer;padding:4px 0;
}
.switch{display:flex;align-items:center;gap:7px;font-size:12.5px;
  letter-spacing:.06em;text-transform:uppercase;color:var(--ink-soft);cursor:pointer;user-select:none}
.switch input{accent-color:var(--moss);width:16px;height:16px;cursor:pointer}
.page{max-width:660px;margin:0 auto;padding:8px 20px 64px}

.masthead{margin:36px 0 8px;text-align:center}
.mast-rule{width:56px;height:2px;background:var(--moss);margin:0 auto 14px;border-radius:2px}
.mast-eyebrow{margin:0;font-size:12px;letter-spacing:.22em;text-transform:uppercase;color:var(--ink-soft)}

.qsec{margin-top:34px}
.question{
  font-family:'Cormorant Garamond',serif;font-style:italic;font-weight:600;
  font-size:clamp(34px,7vw,46px);line-height:1.05;
  color:var(--moss-deep);margin:0 0 16px;
}
.chips{display:flex;flex-wrap:wrap;gap:8px}
.chip{
  font-family:'Karla',sans-serif;font-size:14.5px;font-weight:500;
  color:var(--ink);background:var(--card);
  border:1px solid var(--line);border-radius:999px;
  padding:8px 15px;cursor:pointer;
  transition:border-color .15s,background .15s;
}
.chip:hover{border-color:var(--moss);background:#fff}
.chip:focus-visible,.acc__head:focus-visible,.back:focus-visible,
.chooser-opt:focus-visible,.brand:focus-visible{
  outline:2px solid var(--moss);outline-offset:2px;
}

.back{
  background:none;border:none;color:var(--moss-deep);cursor:pointer;
  font-family:'Karla',sans-serif;font-size:14px;padding:14px 0 6px;
}
.card-title{
  font-family:'Cormorant Garamond',serif;font-weight:600;
  font-size:clamp(30px,6vw,40px);line-height:1.08;margin:6px 0 6px;
  color:var(--ink);
}
.card-sub{margin:0 0 14px;color:var(--ink-soft);font-size:15px;font-style:italic}

.flags{
  border:1.5px solid var(--raspberry);
  background:var(--raspberry-bg);
  border-radius:10px;padding:14px 18px;margin:16px 0 20px;
}
.flags__title{
  font-size:13px;letter-spacing:.08em;text-transform:uppercase;
  color:var(--raspberry);margin:0 0 8px;font-weight:700;
}
.flags ul{margin:0;padding-left:18px}
.flags li{margin:5px 0;color:#5E2530;font-size:15px}

.now{
  background:var(--honey-bg);border-radius:10px;
  padding:16px 18px 14px;margin:0 0 26px;
}
.now__title{
  font-family:'Cormorant Garamond',serif;font-style:italic;font-weight:600;
  font-size:24px;color:var(--honey);margin:0 0 8px;
}
.now ol{margin:0;padding-left:20px}
.now li{margin:7px 0;font-size:15.5px}
.now li::marker{color:var(--honey);font-weight:700}

.modules-title{
  font-size:13px;letter-spacing:.1em;text-transform:uppercase;
  color:var(--ink-soft);margin:0 0 10px;font-weight:700;
}
.acc{border-top:1px solid var(--line)}
.acc:last-of-type{border-bottom:1px solid var(--line)}
.acc__head{
  width:100%;display:flex;justify-content:space-between;align-items:center;
  background:none;border:none;cursor:pointer;
  font-family:'Karla',sans-serif;font-size:16px;font-weight:700;color:var(--ink);
  padding:13px 4px;text-align:left;
}
.acc--open .acc__head{color:var(--moss-deep)}
.acc__sign{font-family:'Cormorant Garamond',serif;font-size:22px;color:var(--moss);line-height:1}
.acc__body{margin:0 0 14px;padding:0 4px 0 22px}
.acc__body li{margin:7px 0;font-size:15px;color:var(--ink)}
.acc__body li::marker{color:var(--moss)}
.hint{font-size:13px;color:var(--ink-soft);font-style:italic;margin-top:12px}

.figs{display:flex;flex-wrap:wrap;gap:10px;margin:4px 0 12px}
.fig{margin:0;background:#fff;border:1px solid var(--line);border-radius:10px;
  padding:8px 6px 5px;text-align:center}
.fig svg{display:block;margin:0 auto}
.fig-line{fill:none;stroke:var(--ink-soft);stroke-width:1.5;stroke-linecap:round;stroke-linejoin:round}
.fig-ring{fill:none;stroke:var(--raspberry);stroke-width:1.1;opacity:.8}
.fig-dot{fill:var(--raspberry)}
.fig-lab{font:700 8px 'Karla',sans-serif;fill:var(--moss-deep);letter-spacing:.02em}
.fig figcaption{font-size:10.5px;color:var(--ink-soft);margin-top:3px;letter-spacing:.04em}

.chooser-q{
  font-family:'Cormorant Garamond',serif;font-style:italic;
  font-size:24px;color:var(--moss-deep);margin:4px 0 14px;
}
.chooser-list{display:flex;flex-direction:column;gap:10px}
.chooser-opt{
  text-align:left;background:var(--card);border:1px solid var(--line);
  border-radius:10px;padding:14px 16px;cursor:pointer;
  font-family:'Karla',sans-serif;font-size:15.5px;color:var(--ink);
  transition:border-color .15s;
}
.chooser-opt:hover{border-color:var(--moss)}

.ph{color:var(--ink-soft);font-size:15.5px;max-width:46ch}
.ph--small{font-size:13.5px}

.foot{
  margin-top:56px;padding-top:16px;border-top:1px solid var(--line);
  font-size:12.5px;color:var(--ink-soft);text-align:center;max-width:52ch;
  margin-left:auto;margin-right:auto;
}
@media (prefers-reduced-motion:reduce){
  *{transition:none!important}
}

/* vanilla accordion */
.acc__wrap{display:none}
.acc--open .acc__wrap{display:block}
</style>
</head>

  Taiyang: { t: "head_side", d: [[31, 41]], l: [26, 30] },
  "An Mian": { t: "head_side", d: [[54, 54]], l: [46, 68] },
  GB20: { t: "head_side", d: [[63, 50]], l: [70, 44] },
  GB21: { t: "head_side", d: [[80, 91]], l: [72, 104] },
  LV3:  { t: "foot_top", d: [[45, 50]], l: [52, 48] },
  KI1:  { t: "foot_sole", d: [[50, 34]], l: [58, 30] },
  SP10: { t: "leg_inner", d: [[44, 10]], l: [50, 10] },
  LV8:  { t: "leg_inner", d: [[58, 32]], l: [66, 30] },
  SP9:  { t: "leg_inner", d: [[44, 36]], l: [16, 38] },
  SP6:  { t: "leg_inner", d: [[46, 80]], l: [18, 82] },
  KI3:  { t: "leg_inner", d: [[56, 96]], l: [64, 94] },
  KI6:  { t: "leg_inner", d: [[44, 110]], l: [56, 118] },
  ST34: { t: "leg_front", d: [[61, 14]], l: [68, 12] },
  Xiyan: { t: "leg_front", d: [[42, 36], [58, 36]], l: [8, 34] },
  GB34: { t: "leg_front", d: [[68, 42]], l: [74, 52] },
  ST36: { t: "leg_front", d: [[58, 50]], l: [66, 62] },
  ST38: { t: "leg_front", d: [[52, 78]], l: [60, 84] },
  LI15: { t: "arm", d: [[30, 22]], l: [8, 12] },
  TE14: { t: "arm", d: [[48, 20]], l: [56, 14] },
  LI11: { t: "arm", d: [[54, 62]], l: [64, 66] },
  CV17: { t: "torso_front", d: [[50, 42]], l: [58, 40] },
  CV12: { t: "torso_front", d: [[50, 66]], l: [58, 64] },
  SI9:  { t: "back_scapula", d: [[62, 54]], l: [50, 68] },
  SI10: { t: "back_scapula", d: [[66, 32]], l: [50, 26] },
  SI11: { t: "back_scapula", d: [[70, 44]], l: [80, 48] },
  BL40: { t: "leg_back", d: [[51, 38]], l: [64, 30] },
  BL57: { t: "leg_back", d: [[51, 76]], l: [62, 82] },
};

const POINT_RX = new RegExp(
  "(An Mian|Yintang|Taiyang|Luozhen|Xiyan|LI15|LI11|LI4(?!\\d)|LU10|LU7(?!\\d)|PC6(?!\\d)|HT7(?!\\d)|HT6(?!\\d)|GB20|GB21|GB34|LV3(?!\\d)|LV8(?!\\d)|KI1(?!\\d)|KI3(?!\\d)|KI6(?!\\d)|SP10|SP9(?!\\d)|SP6(?!\\d)|ST34|ST36|ST38|SI3(?!\\d)|SI9(?!\\d)|SI10|SI11|TE14|BL40|BL57|CV12|CV17)",
  "g"
);

function esc(s){return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");}

var therapist=false, view={type:"home"};

function figsHTML(items){
  var text=items.join("  "), found=[], seen={}, m;
  POINT_RX.lastIndex=0;
  while((m=POINT_RX.exec(text))){ var k=m[0]; if(!seen[k] && POINTS[k]){seen[k]=1;found.push(k);} }
  if(!found.length) return "";
  var byT={};
  found.forEach(function(k){var t=POINTS[k].t;(byT[t]=byT[t]||[]).push(k);});
  var out='<div class="figs">';
  Object.keys(byT).forEach(function(t){
    var keys=byT[t], tpl=FIG_TEMPLATES[t];
    var svg='<svg viewBox="'+tpl.vb+'" width="118" height="146" role="img" aria-label="'+esc(tpl.name)+'">';
    if(tpl.img){
      var vbH=Number(tpl.vb.split(" ")[3])||125;
      svg+='<image href="'+tpl.img+'" x="0" y="0" width="100" height="'+vbH+'" preserveAspectRatio="xMidYMid meet"/>';
    } else {
      (tpl.paths||[]).forEach(function(p){svg+='<path d="'+p+'" class="fig-line"/>';});
      (tpl.circles||[]).forEach(function(c){svg+='<circle cx="'+c[0]+'" cy="'+c[1]+'" r="'+c[2]+'" class="fig-line"/>';});
    }
    if(!tpl.noDots){
      keys.forEach(function(k){POINTS[k].d.forEach(function(xy){
        svg+='<circle cx="'+xy[0]+'" cy="'+xy[1]+'" r="4.5" class="fig-ring"/><circle cx="'+xy[0]+'" cy="'+xy[1]+'" r="2.1" class="fig-dot"/>';});});
      keys.forEach(function(k){var p=POINTS[k],l=p.l||[p.d[0][0]+6,p.d[0][1]-5];
        svg+='<text x="'+l[0]+'" y="'+l[1]+'" class="fig-lab">'+esc(k)+'</text>';});
    }
    svg+='</svg>';
    out+='<figure class="fig">'+svg+'<figcaption>'+esc(tpl.name)+'</figcaption></figure>';
  });
  return out+'</div>';
}

function chipsHTML(list){
  return '<div class="chips">'+list.map(function(p){
    return '<button class="chip" data-pick="'+p.id+'">'+esc(p.label)+'</button>';}).join('')+'</div>';
}

function homeHTML(){
  return '<div class="page">'
    +'<header class="masthead"><div class="mast-rule"></div>'
    +'<p class="mast-eyebrow">domowe kompendium samopomocy</p></header>'
    +'<section class="qsec"><h1 class="question">Co Cię boli?</h1>'+chipsHTML(PAIN)+'</section>'
    +'<section class="qsec"><h1 class="question">Jakie masz inne objawy?</h1>'+chipsHTML(SYMPTOMS)+'</section>'
    +'<footer class="foot">To kompendium metod naturalnych dla domowników i przyjaciół — nie porada medyczna i nie zamiennik lekarza. Przy objawach nagłych lub nasilających się: 112 / 999.</footer>'
    +'</div>';
}

function labelOf(id){
  var all=PAIN.concat(SYMPTOMS);
  for(var i=0;i<all.length;i++) if(all[i].id===id) return all[i].label;
  return id;
}

function cardHTML(card){
  var mods=card.modules.filter(function(m){return !m.therapist||therapist;});
  var html='<div class="page"><button class="back" data-back>&larr; wróć do pytań</button>'
    +'<h1 class="card-title">'+esc(card.title)+'</h1>'
    +(card.subtitle?'<p class="card-sub">'+esc(card.subtitle)+'</p>':'')
    +'<section class="flags"><h2 class="flags__title">🚩 Najpierw sprawdź — kiedy to nie jest sprawa na domowe metody</h2><ul>'
    +card.flags.map(function(f){return '<li>'+esc(f)+'</li>';}).join('')+'</ul></section>'
    +'<section class="now"><h2 class="now__title">Zrób teraz</h2><ol>'
    +card.now.map(function(n){return '<li>'+esc(n)+'</li>';}).join('')+'</ol></section>'
    +'<section><h2 class="modules-title">Chcesz zrobić więcej? Wybieraj i mieszaj:</h2>';
  mods.forEach(function(m){
    var fig=(m.id==="akupresura"||m.id==="akupunktura")?figsHTML(m.items):"";
    html+='<div class="acc"><button class="acc__head" data-acc aria-expanded="false"><span>'
      +esc(MODULE_LABELS[m.id]||m.id)+'</span><span class="acc__sign">+</span></button>'
      +'<div class="acc__wrap">'+fig+'<ul class="acc__body">'
      +m.items.map(function(it){return '<li>'+esc(it)+'</li>';}).join('')+'</ul></div></div>';
  });
  var hasTher=card.modules.some(function(m){return m.therapist;});
  if(!therapist && hasTher) html+='<p class="hint">Moduł akupunktury widoczny po włączeniu trybu terapeuty (u góry strony).</p>';
  return html+'</section></div>';
}

function chooserHTML(ch){
  return '<div class="page"><button class="back" data-back>&larr; wróć do pytań</button>'
    +'<h1 class="card-title">'+esc(ch.title)+'</h1>'
    +'<p class="chooser-q">'+esc(ch.question)+'</p>'
    +'<div class="chooser-list">'+ch.options.map(function(o){
      return '<button class="chooser-opt" data-choose="'+o.cardId+'">'+esc(o.label)+'</button>';}).join('')
    +'</div></div>';
}

function placeholderHTML(label){
  return '<div class="page"><button class="back" data-back>&larr; wróć do pytań</button>'
    +'<h1 class="card-title">'+esc(label)+'</h1>'
    +'<p class="ph">Ta karta czeka na treść.</p>'
    +'<p class="ph ph--small">Jeśli objawy są nasilone albo niepokojące — skontaktuj się z lekarzem.</p></div>';
}

var content=document.getElementById("content");

function render(){
  if(view.type==="home") content.innerHTML=homeHTML();
  else if(view.type==="chooser") content.innerHTML=chooserHTML(CHOOSERS[view.id]);
  else {
    var card=CARDS[view.id];
    content.innerHTML=card?cardHTML(card):placeholderHTML(labelOf(view.id));
  }
  window.scrollTo(0,0);
}

content.addEventListener("click",function(e){
  var el;
  if((el=e.target.closest("[data-pick]"))){
    var id=el.getAttribute("data-pick");
    view=CHOOSERS[id]?{type:"chooser",id:id}:{type:"card",id:id};
    render(); return;
  }
  if(e.target.closest("[data-back]")){view={type:"home"};render();return;}
  if((el=e.target.closest("[data-choose]"))){view={type:"card",id:el.getAttribute("data-choose")};render();return;}
  if((el=e.target.closest("[data-acc]"))){
    var wrap=el.parentElement;
    wrap.classList.toggle("acc--open");
    var open=wrap.classList.contains("acc--open");
    el.setAttribute("aria-expanded",open?"true":"false");
    el.querySelector(".acc__sign").textContent=open?"\u2013":"+";
  }
});

document.getElementById("brand").addEventListener("click",function(){view={type:"home"};render();});
document.getElementById("ther").addEventListener("change",function(e){
  therapist=e.target.checked;
  if(view.type==="card") render();
});

render();

if("serviceWorker" in navigator){
  try{ navigator.serviceWorker.register("./sw.js"); }catch(err){}
}

</script>
</body>
</html>
